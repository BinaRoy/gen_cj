name: ci

on:
  push:
  pull_request:

jobs:
  backend-and-app-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - name: Install deps
        run: npm ci
      - name: Backend tests
        run: npm test
